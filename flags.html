    <h1 class="quiz-title">Flaggen Quiz</h1>

    <div class="popup" id="popup">
        <div class="popup-content">
            <h3>Ergebnisse</h3>
            <div id="popup-content"></div>
            <button onclick="restartQuiz()">Neues Quiz starten</button>
        </div>

    <script>
        // API-Konfiguration – restcountries.com als primäre, zuverlässige API
        const API_CONFIG = {
            // v3.1 all – gibt name.common + flags.png zurück
            primaryUrl: 'https://restcountries.com/v3.1/all?fields=name,flags',
            // v2 als Fallback (ältere, aber oft gecachte Endpunkte)
            fallbackUrl: 'https://restcountries.com/v2/all'
        };

        // Quiz-Konfiguration
        const QUIZ_CONFIG = {
            totalQuestions: 20,
            optionsPerQuestion: 4,
            answerDelay: 1500,
            maxRetries: 3
        };

        // Quiz-State
        let quizState = {
            countries: [],
            usedCountries: new Set(),
            wrongAnswers: [],
            correctCount: 0,
            totalAnswered: 0,
            currentQuestion: 0,
            startTime: null,
            timerInterval: null,
            isQuizActive: false
        };

        // DOM-Elemente
        const elements = {
            flagImage: document.getElementById('flag-image'),
            options: document.getElementById('options'),
            progress: document.getElementById('progress'),
            timeElapsed: document.getElementById('time-elapsed'),
            score: document.getElementById('score'),
            wrongAnswers: document.getElementById('wrong-answers'),
            popup: document.getElementById('popup'),
            popupContent: document.getElementById('popup-content'),
            finishBtn: document.getElementById('finish-btn'),
            skipBtn: document.getElementById('skip-btn')
        };

        // Fullscreen-Funktionalität
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error('Fehler beim Aktivieren des Fullscreen-Modus:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateFullscreenButton() {
            fullscreenBtn.textContent = document.fullscreenElement ? 
                "Exit Fullscreen" : "Go Fullscreen";
        }

        fullscreenBtn.addEventListener('click', toggleFullScreen);
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'F11') {
                event.preventDefault();
                toggleFullScreen();
            }
        });

        // API-Funktionen
        async function fetchCountries() {
            let countries = [];

            // Versuch 1: restcountries.com v3.1
            try {
                const response = await fetch(API_CONFIG.primaryUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                countries = data
                    .filter(c => c.flags && (c.flags.png || c.flags.svg) && c.name && c.name.common)
                    .map(c => ({
                        name: c.name.common,
                        flag: c.flags.png || c.flags.svg
                    }));
            } catch (err) {
                console.warn('Primäre API (v3.1) fehlgeschlagen:', err);
            }

            // Versuch 2: restcountries.com v2 als Fallback
            if (countries.length === 0) {
                try {
                    const response = await fetch(API_CONFIG.fallbackUrl);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();

                    countries = data
                        .filter(c => c.flag && c.name)
                        .map(c => ({
                            name: c.name,
                            flag: c.flag   // v2 liefert direkt eine Flag-Emoji-URL, aber auch flag png via flags.png
                        }));
                } catch (err) {
                    console.warn('Fallback API (v2) fehlgeschlagen:', err);
                }
            }

            // Versuch 3: Flaggen-CDN über flagcdn.com mit bekannten ISO-Codes
            if (countries.length === 0) {
                console.warn('Beide APIs fehlgeschlagen – verwende eingebettetes Fallback-Dataset');
                countries = getHardcodedCountries();
            }

            return countries;
        }

        // Hardcodiertes Fallback-Dataset mit flagcdn.com (läuft ohne externe API)
        function getHardcodedCountries() {
            const data = [
                ['Germany','de'],['France','fr'],['Italy','it'],['Spain','es'],
                ['Portugal','pt'],['Netherlands','nl'],['Belgium','be'],['Austria','at'],
                ['Switzerland','ch'],['Poland','pl'],['Sweden','se'],['Norway','no'],
                ['Denmark','dk'],['Finland','fi'],['Greece','gr'],['Turkey','tr'],
                ['Russia','ru'],['Ukraine','ua'],['Czech Republic','cz'],['Hungary','hu'],
                ['Romania','ro'],['Bulgaria','bg'],['Croatia','hr'],['Serbia','rs'],
                ['United States','us'],['Canada','ca'],['Mexico','mx'],['Brazil','br'],
                ['Argentina','ar'],['Chile','cl'],['Colombia','co'],['Peru','pe'],
                ['Venezuela','ve'],['Bolivia','bo'],['Ecuador','ec'],['Uruguay','uy'],
                ['Paraguay','py'],['Cuba','cu'],['Jamaica','jm'],['Haiti','ht'],
                ['China','cn'],['Japan','jp'],['South Korea','kr'],['India','in'],
                ['Pakistan','pk'],['Bangladesh','bd'],['Indonesia','id'],['Vietnam','vn'],
                ['Thailand','th'],['Malaysia','my'],['Philippines','ph'],['Singapore','sg'],
                ['Myanmar','mm'],['Cambodia','kh'],['Laos','la'],['Mongolia','mn'],
                ['Nepal','np'],['Sri Lanka','lk'],['Afghanistan','af'],['Iran','ir'],
                ['Iraq','iq'],['Saudi Arabia','sa'],['United Arab Emirates','ae'],
                ['Israel','il'],['Jordan','jo'],['Lebanon','lb'],['Syria','sy'],
                ['Yemen','ye'],['Oman','om'],['Qatar','qa'],['Kuwait','kw'],['Bahrain','bh'],
                ['Egypt','eg'],['Libya','ly'],['Tunisia','tn'],['Algeria','dz'],['Morocco','ma'],
                ['Sudan','sd'],['Ethiopia','et'],['Kenya','ke'],['Tanzania','tz'],
                ['Uganda','ug'],['Rwanda','rw'],['Nigeria','ng'],['Ghana','gh'],
                ['Ivory Coast','ci'],['Senegal','sn'],['Cameroon','cm'],['Zimbabwe','zw'],
                ['South Africa','za'],['Mozambique','mz'],['Angola','ao'],['Somalia','so'],
                ['Australia','au'],['New Zealand','nz'],['Papua New Guinea','pg'],['Fiji','fj'],
                ['United Kingdom','gb'],['Ireland','ie'],['Iceland','is'],['Luxembourg','lu'],
                ['Slovakia','sk'],['Slovenia','si'],['Lithuania','lt'],['Latvia','lv'],['Estonia','ee'],
                ['Belarus','by'],['Moldova','md'],['Albania','al'],['North Macedonia','mk'],
                ['Kosovo','xk'],['Bosnia and Herzegovina','ba'],['Montenegro','me'],
                ['Kazakhstan','kz'],['Uzbekistan','uz'],['Georgia','ge'],['Armenia','am'],['Azerbaijan','az']
            ];
            return data.map(([name, code]) => ({
                name,
                flag: `https://flagcdn.com/w320/${code}.png`
            }));
        }

        // Quiz-Funktionen
        async function initializeQuiz() {
            showLoadingState();
            
            try {
                let allCountries = await fetchCountries();
                
                if (allCountries.length === 0) {
                    throw new Error('Keine Länderdaten verfügbar');
                }

                // Zufällige Auswahl von totalQuestions Ländern
                allCountries = allCountries.sort(() => Math.random() - 0.5);
                quizState.countries = allCountries.slice(0, QUIZ_CONFIG.totalQuestions);
                // Alle Länder für Options-Generierung behalten
                quizState.allCountries = allCountries;

                startQuiz();
            } catch (error) {
                showError('Fehler beim Laden der Flaggen. Bitte versuche es später erneut.');
                console.error('Initialisierungsfehler:', error);
            }
        }

        function startQuiz() {
            resetQuizState();
            quizState.isQuizActive = true;
            startTimer();
            showNextQuestion();
            
            elements.finishBtn.addEventListener('click', finishQuiz);
            if (elements.skipBtn) elements.skipBtn.addEventListener('click', skipQuestion);
        }

        function showNextQuestion() {
            if (!quizState.isQuizActive || quizState.currentQuestion >= quizState.countries.length) {
                finishQuiz();
                return;
            }

            const currentCountry = quizState.countries[quizState.currentQuestion];
            elements.flagImage.src = currentCountry.flag;
            elements.flagImage.alt = `Flagge von ${currentCountry.name}`;

            generateOptions(currentCountry.name);
            updateProgress();
        }

        function generateOptions(correctAnswer) {
            elements.options.innerHTML = '';
            const options = new Set([correctAnswer]);

            // Zufällige Optionen aus allen Ländern generieren (nicht nur Quiz-Länder)
            const pool = quizState.allCountries || quizState.countries;
            let attempts = 0;
            while (options.size < QUIZ_CONFIG.optionsPerQuestion && attempts < 200) {
                const randomCountry = pool[Math.floor(Math.random() * pool.length)];
                if (randomCountry.name !== correctAnswer) {
                    options.add(randomCountry.name);
                }
                attempts++;
            }

            const shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = option;
                button.addEventListener('click', () => handleAnswer(button, correctAnswer));
                elements.options.appendChild(button);
            });
        }

        function handleAnswer(selectedButton, correctAnswer) {
            if (!quizState.isQuizActive) return;

            const allButtons = elements.options.querySelectorAll('.option-button');
            allButtons.forEach(btn => btn.disabled = true);

            const isCorrect = selectedButton.textContent === correctAnswer;
            
            if (isCorrect) {
                selectedButton.classList.add('correct');
                quizState.correctCount++;
            } else {
                selectedButton.classList.add('wrong');
                quizState.wrongAnswers.push({
                    country: correctAnswer,
                    selected: selectedButton.textContent
                });
                
                allButtons.forEach(btn => {
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('highlight-correct');
                    }
                });
            }

            quizState.totalAnswered++;
            quizState.currentQuestion++;

            setTimeout(() => {
                if (quizState.isQuizActive) {
                    showNextQuestion();
                }
            }, QUIZ_CONFIG.answerDelay);
        }

        function skipQuestion() {
            if (!quizState.isQuizActive) return;
            
            quizState.wrongAnswers.push({
                country: quizState.countries[quizState.currentQuestion].name,
                selected: 'Übersprungen'
            });
            
            quizState.currentQuestion++;
            quizState.totalAnswered++;
            showNextQuestion();
        }

        function finishQuiz() {
            quizState.isQuizActive = false;
            clearInterval(quizState.timerInterval);
            showResults();
        }

        function showResults() {
            const percentage = quizState.totalAnswered > 0 ? 
                (quizState.correctCount / quizState.totalAnswered) * 100 : 0;
            const elapsedTime = Math.floor((Date.now() - quizState.startTime) / 1000);

            const resultsHTML = `
                <p>Du hast ${quizState.correctCount} von ${quizState.totalAnswered} richtig beantwortet.</p>
                <p class="percentage-score">${percentage.toFixed(1)}%</p>
                <p>Gesamtzeit: ${elapsedTime}s</p>
                
                ${quizState.wrongAnswers.length > 0 ? `
                    <h4>Falsche Antworten:</h4>
                    <ul class="wrong-answers-list">
                        ${quizState.wrongAnswers.map(item => `
                            <li>
                                <strong>${item.country}</strong>
                                ${item.selected !== 'Übersprungen' ? `(Deine Antwort: ${item.selected})` : '(Übersprungen)'}
                            </li>
                        `).join('')}
                    </ul>
                ` : '<p class="perfect-score">Perfekte Leistung! 🎉</p>'}
            `;

            elements.popupContent.innerHTML = resultsHTML;
            elements.popup.classList.add('show');
        }

        function restartQuiz() {
            elements.popup.classList.remove('show');
            initializeQuiz();
        }

        // Timer-Funktionen
        function startTimer() {
            quizState.startTime = Date.now();
            quizState.timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!quizState.startTime) return;
            const elapsedTime = Math.floor((Date.now() - quizState.startTime) / 1000);
            elements.timeElapsed.textContent = `${elapsedTime}s`;
        }

        function resetTimer() {
            clearInterval(quizState.timerInterval);
            quizState.timerInterval = null;
            quizState.startTime = null;
            elements.timeElapsed.textContent = "0s";
        }

        // Hilfsfunktionen
        function updateProgress() {
            const percentage = quizState.totalAnswered > 0 ? 
                Math.round((quizState.correctCount / quizState.totalAnswered) * 100) : 0;
            
            elements.progress.textContent = `${quizState.currentQuestion + 1} / ${quizState.countries.length}`;
            elements.score.textContent = `${percentage}%`;
        }

        function resetQuizState() {
            quizState.usedCountries.clear();
            quizState.wrongAnswers = [];
            quizState.correctCount = 0;
            quizState.totalAnswered = 0;
            quizState.currentQuestion = 0;
            quizState.isQuizActive = false;
            
            resetTimer();
            updateProgress();
        }

        function showLoadingState() {
            elements.flagImage.src = '';
            elements.options.innerHTML = '<div class="loading">Lädt Flaggen...</div>';
            elements.progress.textContent = '0 / 0';
            elements.score.textContent = '0%';
        }

        function showError(message) {
            elements.options.innerHTML = `<div class="error-message">${message}</div>`;
        }

        // Initialisierung
        document.addEventListener('DOMContentLoaded', initializeQuiz);

        // Error Handling für Bild-Ladefehler
        elements.flagImage.addEventListener('error', function() {
            this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjEyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkZsYWdnZSBuaWNodCB2ZXJmw7xnYmFyPC90ZXh0Pjwvc3ZnPg==';
        });
    </script>
